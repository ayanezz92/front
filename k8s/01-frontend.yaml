apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sanos-salvos
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: TU_USUARIO_DOCKERHUB/sanos-salvos-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
# En EKS no hay controlador de Ingress por defecto (ni ALB Controller,
# generalmente bloqueado por IAM en AWS Academy/LabRole). Se expone
# directamente con un Service type LoadBalancer -> crea un Classic/NLB de AWS.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sanos-salvos
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
